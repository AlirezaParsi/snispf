<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="light dark">
  <title>SNISPF</title>
  <!-- KsuWebUI internal: switches the WebView to edge-to-edge and exposes real
       system-bar insets as --window-inset-* (host-served, works offline). This
       removes the dark band under the status/nav bar — content goes under the
       transparent bars. We do NOT call ksu.fullScreen, so the bars stay shown. -->
  <link rel="stylesheet" href="https://mui.kernelsu.org/internal/insets.css">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div id="app">
    <header class="appbar">
      <div class="appbar__brand">
        <span class="appbar__mark" id="appMark" aria-hidden="true"></span>
        <span class="appbar__name">SNISPF</span>
      </div>
      <div class="appbar__actions">
        <button class="iconbtn iconbtn--text" id="langBtn" type="button" aria-label="Language"></button>
        <button class="iconbtn" id="themeBtn" type="button" aria-label="Theme"></button>
        <div class="appbar__status" id="appStatus" data-state="connecting">
          <span class="appbar__dot" aria-hidden="true"></span>
          <span class="appbar__statusText" id="appStatusText">connecting</span>
        </div>
      </div>
    </header>

    <main class="view" id="view" tabindex="-1"></main>

    <nav class="bottomnav" id="bottomnav" role="tablist" aria-label="Sections"></nav>
  </div>

  <div class="toaster" id="toaster" aria-live="polite" aria-atomic="false"></div>

  <script src="js/core.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/tabs/status.js"></script>
  <script src="js/tabs/config.js"></script>
  <script src="js/tabs/scan.js"></script>
  <script src="js/tabs/logs.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
