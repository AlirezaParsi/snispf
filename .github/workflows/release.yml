name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: engine/go.sum

      - name: Build flashable module zip
        run: |
          sudo apt-get update && sudo apt-get install -y zip
          NAME="snispf-${GITHUB_REF_NAME:-dev}.zip"
          bash build.sh "$PWD/$NAME"
          echo "ZIP=$NAME" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: snispf-module
          path: ${{ env.ZIP }}

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP }}
          generate_release_notes: true

      # Point the OTA manifest (update.json on main) at this release so root
      # managers see the new version. module.prop on main already has the
      # version/versionCode that was tagged.
      - name: Refresh update.json
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          VER=$(grep '^version=' module/module.prop | cut -d= -f2)
          CODE=$(grep '^versionCode=' module/module.prop | cut -d= -f2)
          cat > update.json <<JSON
          {
            "version": "$VER",
            "versionCode": $CODE,
            "zipUrl": "https://github.com/${{ github.repository }}/releases/download/${GITHUB_REF_NAME}/snispf-${GITHUB_REF_NAME}.zip",
            "changelog": "https://raw.githubusercontent.com/${{ github.repository }}/main/changelog.md"
          }
          JSON
          git add update.json
          git commit -m "chore: update.json -> $VER [skip ci]" || { echo "no change"; exit 0; }
          git push origin main
